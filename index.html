          <li><strong>신협 데일리론</strong> — 신협중앙회 연계. 일 단위 상환으로 이자 최소화.</li>
          <li><strong>의료기기 렌탈</strong> — MRI, CT, 초음파, 내시경, 엑스레이 등 의료장비 렌탈·리스.</li>
          <li><strong>긴급자금</strong> — 병원 운영자금, 리모델링 자금, 확장이전 자금 최단 D+5일 집행.</li>
